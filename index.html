<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature_Converter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="container">
    <div class="container-fluid d-flex fs-1 fw-bold justify-content-center align-items-center mt-4 mb-3">
        <p class="text-center">Temperature Converter</p>
    </div>
    <div class="container border rounded">
        <div class="container d-flex justify-content-center align-items-center my-5 p-5">
            <h1 class="h1" id="output">0.00</h1>
        </div>
        <form class="container my-2" id="inputForm">
            <input type="number" class="form-control" placeholder="Enter Degrees..." id="inpDegree">
            <div class="row">
                <div class=" col-6 mt-3">
                    <label class="form-label">From</label>
                    <select class="form-select" size="4" id="ConvertFrom">
                        <option value="C" selected>Celsius</option>
                        <option value="F">Fahrenhet</option>
                        <option value="K">Kelvin</option>
                        <option value="R">Rankine</option>
                    </select>
                </div>
                <div class="col-6 mt-3">
                    <label class="form-label">To</label>
                    <select class="form-select" size="4" id="ConvertTo">
                        <option value="C" selected>Celsius</option>
                        <option value="F">Fahrenhet</option>
                        <option value="K">Kelvin</option>
                        <option value="R">Rankine</option>
                    </select>
                </div>
            </div>
            <div class="container d-flex justify-content-center align-items-center mt-3">
                <button type="submit" class="btn btn-success">Convert</button>
            </div>
        </form>
    </div>
    <div class="container">

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
